<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自分の言葉リマインダー</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #111827;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    h1 {
      font-size: 28px;
      margin: 0 0 8px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    .quote-box {
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 22px;
      padding: 12px;
      border-radius: 12px;
      background: #fafafa;
      border: 1px dashed var(--border);
      white-space: pre-wrap;
    }

    .quote-empty {
      color: var(--muted);
      font-size: 16px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 16px; /* タップしやすく */
      cursor: pointer;
      background: var(--accent);
      color: white;
      font-size: 16px; /* iPhone最適 */
    }

    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    button.danger {
      background: #b91c1c;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      font-size: 16px; /* iPhoneでズーム防止 */
      line-height: 1.6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: white;
    }

    .help {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #fff;
    }

    .item-text {
      white-space: pre-wrap;
      margin-bottom: 10px;
    }

    .item-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .count {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>自分の言葉リマインダー</h1>
    <div class="sub">大切にしたい言葉を保存して、ランダムに見返すための小さなアプリ</div>

    <section class="card">
      <div id="quoteDisplay" class="quote-box">
        <span class="quote-empty">まだ言葉がありません。下から追加してください。</span>
      </div>
      <div class="actions">
        <button id="randomBtn">今日の一言を表示</button>
        <button id="showFirstBtn" class="secondary">最初の言葉を表示</button>
      </div>
    </section>

    <section class="card">
      <h2>言葉を追加</h2>
      <textarea id="quoteInput" placeholder="例：完璧じゃなくていい、まず動く"></textarea>
      <div class="actions">
        <button id="addBtn">追加する</button>
        <button id="clearInputBtn" class="secondary">入力を消す</button>
      </div>
      <div class="help">思いついた言葉を短く入れるだけでOKです。</div>
    </section>

    <section class="card">
      <h2>保存した言葉</h2>
      <div id="count" class="count">0件</div>
      <div id="quoteList" class="list"></div>
      <div class="actions">
        <button id="clearAllBtn" class="danger">全部削除</button>
      </div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = 'my_reminder_quotes_v1';

    const quoteDisplay = document.getElementById('quoteDisplay');
    const quoteInput = document.getElementById('quoteInput');
    const quoteList = document.getElementById('quoteList');
    const countEl = document.getElementById('count');

    function loadQuotes() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch (error) {
        console.error('保存データの読み込みに失敗しました:', error);
        return [];
      }
    }

    function saveQuotes(quotes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(quotes));
    }

    function renderDisplay(text) {
      if (!text) {
        quoteDisplay.innerHTML = '<span class="quote-empty">まだ言葉がありません。下から追加してください。</span>';
        return;
      }
      quoteDisplay.textContent = text;
    }

    function renderList() {
      const quotes = loadQuotes();
      quoteList.innerHTML = '';
      countEl.textContent = `${quotes.length}件`;

      if (quotes.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'help';
        empty.textContent = 'まだ保存された言葉はありません。';
        quoteList.appendChild(empty);
        renderDisplay('');
        return;
      }

      quotes.forEach((quote, index) => {
        const item = document.createElement('div');
        item.className = 'item';

        const text = document.createElement('div');
        text.className = 'item-text';
        text.textContent = quote;

        const actions = document.createElement('div');
        actions.className = 'item-actions';

        const showBtn = document.createElement('button');
        showBtn.className = 'secondary';
        showBtn.textContent = '表示';
        showBtn.addEventListener('click', () => renderDisplay(quote));

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'danger';
        deleteBtn.textContent = '削除';
        deleteBtn.addEventListener('click', () => deleteQuote(index));

        actions.appendChild(showBtn);
        actions.appendChild(deleteBtn);
        item.appendChild(text);
        item.appendChild(actions);
        quoteList.appendChild(item);
      });
    }

    function addQuote() {
      const value = quoteInput.value.trim();
      if (!value) {
        alert('言葉を入力してください。');
        return;
      }

      const quotes = loadQuotes();
      quotes.push(value);
      saveQuotes(quotes);
      quoteInput.value = '';
      renderList();
      renderDisplay(value);
    }

    function deleteQuote(index) {
      const quotes = loadQuotes();
      quotes.splice(index, 1);
      saveQuotes(quotes);
      renderList();
    }

    function showRandomQuote() {
      const quotes = loadQuotes();
      if (quotes.length === 0) {
        renderDisplay('');
        return;
      }
      const randomIndex = Math.floor(Math.random() * quotes.length);
      renderDisplay(quotes[randomIndex]);
    }

    function showFirstQuote() {
      const quotes = loadQuotes();
      if (quotes.length === 0) {
        renderDisplay('');
        return;
      }
      renderDisplay(quotes[0]);
    }

    function clearAllQuotes() {
      const ok = confirm('保存した言葉を全部削除しますか？');
      if (!ok) return;
      localStorage.removeItem(STORAGE_KEY);
      renderList();
    }

    document.getElementById('addBtn').addEventListener('click', addQuote);
    document.getElementById('randomBtn').addEventListener('click', showRandomQuote);
    document.getElementById('showFirstBtn').addEventListener('click', showFirstQuote);
    document.getElementById('clearInputBtn').addEventListener('click', () => {
      quoteInput.value = '';
      quoteInput.focus();
    });
    document.getElementById('clearAllBtn').addEventListener('click', clearAllQuotes);

    quoteInput.addEventListener('keydown', (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
        addQuote();
      }
    });

    renderList();
  </script>
</body>
</html>
